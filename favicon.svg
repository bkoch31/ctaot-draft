<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>

  <!-- Ice rink oval -->
  <ellipse cx="32" cy="42" rx="20" ry="7" fill="none" stroke="#a8d8ea" stroke-width="1.5" opacity="0.5"/>

  <!-- Hockey stick handle -->
  <line x1="20" y1="10" x2="36" y2="38" stroke="#e0c080" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Hockey stick blade -->
  <path d="M34 37 Q44 41 44 46 Q44 49 40 49 Q36 49 34 44 Z" fill="#e0c080"/>

  <!-- Puck -->
  <ellipse cx="45" cy="47" rx="5" ry="2.5" fill="#333" stroke="#666" stroke-width="0.8"/>

  <!-- Jersey number / team dots -->
  <circle cx="22" cy="30" r="2" fill="#e74c3c" opacity="0.9"/>
  <circle cx="28" cy="22" r="2" fill="#3498db" opacity="0.9"/>
  <circle cx="34" cy="14" r="2" fill="#2ecc71" opacity="0.9"/>

  <!-- Shine on circle -->
  <circle cx="20" cy="14" r="6" fill="white" opacity="0.04"/>
</svg>
