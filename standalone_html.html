function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function buildTeams(scoreMap, posMap, goalieScoreMap) {
  const players = raw.map(([name, pos, origScore, by, wt]) => ({
    name, pos: posMap[name] ?? pos,
    score: scoreMap[name] ?? (origScore ?? 5),
    age: 2026 - by, weight: wt,
    unrated: origScore === null && scoreMap[name] === undefined,
    captain: captainNames.some(c => c.toLowerCase() === name.toLowerCase()),
  }));
  const goalies = initialGoalies.map(g => ({ ...g, score: goalieScoreMap[g.name] ?? g.score }));
  const forwards = players.filter(p => p.pos==="F"), defense = players.filter(p => p.pos==="D");
  const captainF = forwards.filter(p=>p.captain), captainD = defense.filter(p=>p.captain);
  const nonCapF = forwards.filter(p=>!p.captain), nonCapD = defense.filter(p=>!p.captain);
  function snakeDraft(list, n) {
    const t = Array.from({length:n},()=>[]);
    list.forEach((p,i)=>{ const r=Math.floor(i/n),pos=i%n; t[r%2===0?pos:n-1-pos].push(p); });
    return t;
  }
  const allCaps = [...captainF,...captainD].sort((a,b)=>b.score-a.score);
  const fBase = Array.from({length:8},()=>[]), dBase = Array.from({length:8},()=>[]);
  allCaps.forEach((c,i)=>{ if(c.pos==="F") fBase[i].push(c); else dBase[i].push(c); });
  const draftF = snakeDraft([...nonCapF].sort((a,b)=>b.score-a.score),8);
  const draftD = snakeDraft([...nonCapD].sort((a,b)=>b.score-a.score),8);
  const fTeams = fBase.map((b,i)=>[...b,...draftF[i]]);
  const dTeams = dBase.map((b,i)=>[...b,...draftD[i]]);
  for(let i=0;i<8;i++){
    while(dTeams[i].length<5){
      let donorIdx=-1,maxD=5;
      for(let j=0;j<8;j++){if(j!==i&&dTeams[j].length>maxD){maxD=dTeams[j].length;donorIdx=j;}}
      if(donorIdx===-1) break;
      const needAvg=dTeams[i].length?avg(dTeams[i].map(p=>p.score)):5;
      const cands=dTeams[donorIdx].filter(p=>!p.captain).sort((a,b)=>Math.abs(a.score-needAvg)-Math.abs(b.score-needAvg));
      if(!cands.length) break;
      const mover=cands[0];
      dTeams[donorIdx]=dTeams[donorIdx].filter(p=>p!==mover); dTeams[i].push(mover);
      const fCands=fTeams[i].filter(p=>!p.captain).sort((a,b)=>Math.abs(a.score-avg(fTeams[donorIdx].map(p=>p.score)))-Math.abs(b.score-avg(fTeams[donorIdx].map(p=>p.score))));
      if(fCands.length){const fm=fCands[0];fTeams[i]=fTeams[i].filter(p=>p!==fm);fTeams[donorIdx].push(fm);}
    }
  }
  const skaterRank=fTeams.map((f,i)=>({idx:i,avg:avg([...f,...dTeams[i]].map(p=>p.score))})).sort((a,b)=>a.avg-b.avg);
  const sortedG=[...goalies].sort((a,b)=>b.score-a.score);
  const goalieMap={};
  skaterRank.forEach((t,i)=>{goalieMap[t.idx]={...sortedG[i],pos:"G"};});
  let ts=fTeams.map((f,i)=>({id:i+1,players:[...f,...dTeams[i],goalieMap[i]]}));
  function spreadOf(v){return Math.max(...v)-Math.min(...v);}
  for(let iter=0;iter<1000;iter++){
    const ages=ts.map(t=>avg(t.players.map(p=>p.age)));
    const scores=ts.map(t=>avg(t.players.map(p=>p.score)));
    const weights=ts.map(t=>avg(t.players.map(p=>p.weight)));
    const aS=spreadOf(ages),sS=spreadOf(scores),wS=spreadOf(weights);
    if(aS<2&&sS<0.4&&wS<8) break;
    const pairs=[];
    if(aS>=2) pairs.push([ages.indexOf(Math.max(...ages)),ages.indexOf(Math.min(...ages))]);
    if(sS>=0.4) pairs.push([scores.indexOf(Math.max(...scores)),scores.indexOf(Math.min(...scores))]);
    if(wS>=8) pairs.push([weights.indexOf(Math.max(...weights)),weights.indexOf(Math.min(...weights))]);
    let best=null,bestG=0;
    for(const [iA,iB] of pairs){
      ts[iA].players.forEach((pa,oi)=>{
        if(pa.pos==="G"||pa.captain) return;
        ts[iB].players.forEach((pb,yi)=>{
          if(pb.pos!==pa.pos||pb.captain) return;
          const nA=ts[iA].players.length,nB=ts[iB].players.length;
          const nA2=[...ages],nS2=[...scores],nW2=[...weights];
          nA2[iA]=(ages[iA]*nA-pa.age+pb.age)/nA; nA2[iB]=(ages[iB]*nB-pb.age+pa.age)/nB;
          nS2[iA]=(scores[iA]*nA-pa.score+pb.score)/nA; nS2[iB]=(scores[iB]*nB-pb.score+pa.score)/nB;
          nW2[iA]=(weights[iA]*nA-pa.weight+pb.weight)/nA; nW2[iB]=(weights[iB]*nB-pb.weight+pa.weight)/nB;
          const g=(aS-spreadOf(nA2))+(sS-spreadOf(nS2))*5+(wS-spreadOf(nW2))*0.1;
          if(g>bestG){bestG=g;best={iA,iB,oi,yi};}
        });
      });
    }
    if(!best||bestG<=0) break;
    const tmp=ts[best.iA].players[best.oi];
    ts[best.iA].players[best.oi]=ts[best.iB].players[best.yi];
    ts[best.iB].players[best.yi]=tmp;
  }
  return ts;
}

function teamStats(team) {
  const ps=team.players,fP=ps.filter(p=>p.pos==="F"),dP=ps.filter(p=>p.pos==="D");
  return { fwd:fP.length,def:dP.length,goal:ps.filter(p=>p.pos==="G").length,
    avgScore:avg(ps.map(p=>p.score)),avgFwdScore:avg(fP.map(p=>p.score)),
    avgDefScore:avg(dP.map(p=>p.score)),avgAge:avg(ps.map(p=>p.age)),
    avgWeight:avg(ps.map(p=>p.weight)),total:ps.length };
}

  function startEdit(name,field,current){setEditing({name,field});setEditVal(String(current));}

    if(!editing) return;
    const {name,field}=editing;
    if(field==="score"){const v=parseFloat(editVal);if(!isNaN(v)&&v>=1&&v<=11)setScoreMap(p=>({...p,[name]:v}));}
    else if(field==="pos"){if(["F","D"].includes(editVal))setPosMap(p=>({...p,[name]:editVal}));}
    else if(field==="goalieScore"){const v=parseFloat(editVal);if(!isNaN(v)&&v>=1&&v<=20)setGoalieScoreMap(p=>({...p,[name]:v}));}
    setEditing(null);
  }
  function btnStyle(bg){return {padding:"2px 6px",borderRadius:4,border:"none",background:bg,color:"#fff",cursor:"pointer",fontSize:11};}

  function PlayerRow({p,i}){
    const isEditingScore=editing?.name===p.name&&editing?.field==="score";

    if(s.avgAge===Math.min(...allS.map(x=>x.avgAge))) facts.push("👶 Youngest team — legs for days.");
    if(s.avgWeight===Math.max(...allS.map(x=>x.avgWeight))) facts.push("🐘 Heaviest team — good luck getting them off the puck.");
    if(s.avgWeight===Math.min(...allS.map(x=>x.avgWeight))) facts.push("🐦 Lightest team — built for speed.");

              <th style={{padding:"8px 10px",textAlign:"left"}}>Team</th>
              <th style={{padding:"8px 10px",textAlign:"left"}}>Captain</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Players</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Fwd</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Def</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Avg Score</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Avg Fwd</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Avg Def</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Goalie</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Avg Age</th>
              <th style={{padding:"8px 10px",textAlign:"center"}}>Avg Weight</th>
            </tr></thead>
            <tbody>
              {allStats.map((s,i)=>{
                const ages=allStats.map(x=>x.avgAge),scores=allStats.map(x=>x.avgScore),weights=allStats.map(x=>x.avgWeight);
                const oldest=ages.indexOf(Math.max(...ages))===i,youngest=ages.indexOf(Math.min(...ages))===i;
                const heaviest=weights.indexOf(Math.max(...weights))===i,lightest=weights.indexOf(Math.min(...weights))===i;
                const skilled=scores.indexOf(Math.max(...scores))===i,weakest=scores.indexOf(Math.min(...scores))===i;
                return (
                  <tr key={i} style={{borderBottom:"1px solid #eee",background:i%2===0?"#fff":"#fafafa",cursor:"pointer"}}
                    onClick={()=>{setSelected(i);setView("roster");}}>
                    <td style={{padding:"8px 10px"}}><span style={{display:"inline-block",width:12,height:12,borderRadius:"50%",background:teamColors[i],marginRight:8}}/><strong>{teamNames[i]}</strong></td>
                    <td style={{padding:"8px 10px"}}>{teams[i].players.find(p=>p.captain)?.name??"—"}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{s.total}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{s.fwd}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{s.def}</td>
                    <td style={{padding:"8px 10px",textAlign:"center",fontWeight:600}}>{s.avgScore.toFixed(2)} {skilled?"🌟":weakest?"🥄":""}</td>
                    <td style={{padding:"8px 10px",textAlign:"center",color:"#e67e22"}}>{s.avgFwdScore.toFixed(2)}</td>
                    <td style={{padding:"8px 10px",textAlign:"center",color:"#3498db"}}>{s.avgDefScore.toFixed(2)}</td>
                    <td style={{padding:"8px 10px",textAlign:"center",color:"#8e44ad"}}>{teams[i].players.find(p=>p.pos==="G")?.score??"—"}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{s.avgAge.toFixed(1)} {oldest?"👴":youngest?"👶":""}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{s.avgWeight.toFixed(0)} lbs {heaviest?"🐘":lightest?"🐦":""}</td>
                  </tr>
                );
              })}
              <tr style={{background:"#e8f4fd",fontWeight:700,borderTop:"2px solid #3498db"}}>
                <td style={{padding:"8px 10px"}}>Overall Avg</td><td style={{padding:"8px 10px"}}>—</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{(allStats.reduce((a,s)=>a+s.total,0)/8).toFixed(1)}</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{(allStats.reduce((a,s)=>a+s.fwd,0)/8).toFixed(1)}</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{(allStats.reduce((a,s)=>a+s.def,0)/8).toFixed(1)}</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{avg(allStats.map(s=>s.avgScore)).toFixed(2)}</td>
                <td style={{padding:"8px 10px",textAlign:"center",color:"#e67e22"}}>{avg(allStats.map(s=>s.avgFwdScore)).toFixed(2)}</td>
                <td style={{padding:"8px 10px",textAlign:"center",color:"#3498db"}}>{avg(allStats.map(s=>s.avgDefScore)).toFixed(2)}</td>
                <td style={{padding:"8px 10px",textAlign:"center",color:"#8e44ad"}}>{avg(teams.map(t=>t.players.find(p=>p.pos==="G")?.score??0)).toFixed(1)}</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{avg(allStats.map(s=>s.avgAge)).toFixed(1)}</td>
                <td style={{padding:"8px 10px",textAlign:"center"}}>{avg(allStats.map(s=>s.avgWeight)).toFixed(0)} lbs</td>
              </tr>
            </tbody>
          </table>
          <p style={{fontSize:12,color:"#999",marginTop:8}}>Click a row to view that team's roster.</p>
          <div style={{marginTop:12,background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#581c87"}}>
            <strong>🏆 Tournament Extremes</strong><br/>
            <span>👴 Oldest: <strong>{globalOldest.name}</strong> ({globalOldest.age})</span> &nbsp;·&nbsp;
            <span>👶 Youngest: <strong>{globalYoungest.name}</strong> ({globalYoungest.age})</span> &nbsp;·&nbsp;
            <span>📅 Age gap: <strong>{globalOldest.age-globalYoungest.age} years</strong></span>
          </div>
          <p style={{fontSize:11,color:"#bbb",marginTop:12,lineHeight:1.8}}>🌟 Most skilled · 🥄 Least skilled · 👴 Oldest · 👶 Youngest · 🐘 Heaviest · 🐦 Lightest</p>
          <div style={{marginTop:8,background:"#fff8e1",border:"1px solid #f9a825",borderRadius:8,padding:"10px 14px",fontSize:12}}>
            <strong style={{fontSize:13}}>⚠️ Unranked Players</strong>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
              {teams.flatMap((t,i)=>t.players.filter(p=>p.unrated).map(p=>({...p,teamIdx:i}))).map((p,i)=>(
                <span key={i} style={{background:"#fff3cd",border:"1px solid #f9a825",borderRadius:4,padding:"3px 8px",color:"#856404",fontSize:12}}>
                  {p.name} <span style={{fontWeight:400,color:"#aaa"}}>({teamNames[p.teamIdx]})</span>
                </span>
              ))}
            </div>
          </div>
          <div style={{marginTop:12,background:"#f9f9f9",border:"1px solid #eee",borderRadius:8,padding:"10px 14px",fontSize:12}}>
            <strong style={{fontSize:13}}>👨‍👩‍👦 Family Groups</strong>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
              {familyGroups.map((g,i)=>(
                <span key={i} style={{background:g.color+"22",border:`1px solid ${g.color}`,borderRadius:4,padding:"3px 8px",color:g.color,fontWeight:600,fontSize:12}}>
                  {g.members.join(" & ")} <span style={{fontWeight:400,color:"#888"}}>({g.label})</span>
                </span>
              ))}
            </div>
          </div>
        </div>
      )}

      {view==="radar"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
            {teams.map((t,i)=>{
              const s=teamStats(t),allS=teams.map(teamStats);
              const norm=(val,arr)=>(val-Math.min(...arr))/(Math.max(...arr)-Math.min(...arr)||1);
              const metrics=[
                {label:"Skill",val:norm(s.avgScore,allS.map(x=>x.avgScore))},
                {label:"Fwd",val:norm(s.avgFwdScore,allS.map(x=>x.avgFwdScore))},
                {label:"Def",val:norm(s.avgDefScore,allS.map(x=>x.avgDefScore))},
                {label:"Youth",val:1-norm(s.avgAge,allS.map(x=>x.avgAge))},
                {label:"Weight",val:norm(s.avgWeight,allS.map(x=>x.avgWeight))},
                {label:"Goalie",val:norm(t.players.find(p=>p.pos==="G")?.score??0,teams.map(t=>t.players.find(p=>p.pos==="G")?.score??0))},
              ];
              const cx=80,cy=80,r=55,n=metrics.length;
              const angle=idx=>(Math.PI*2*idx/n)-Math.PI/2;
              const pt=(idx,radius)=>[cx+radius*Math.cos(angle(idx)),cy+radius*Math.sin(angle(idx))];
              const spiderPts=metrics.map((_,idx)=>pt(idx,metrics[idx].val*r)).map(([x,y])=>`${x},${y}`).join(" ");
              const gridPts=f=>metrics.map((_,idx)=>pt(idx,r*f)).map(([x,y])=>`${x},${y}`).join(" ");
              return (
                <div key={i} style={{background:"#f8f9fa",borderRadius:8,padding:12,textAlign:"center",border:`2px solid ${teamColors[i]}`}}>
                  <div style={{fontWeight:700,fontSize:12,color:teamColors[i],marginBottom:2}}>{teamNames[i]}</div>
                  <div style={{fontSize:10,color:"#888",marginBottom:4}}>{t.players.find(p=>p.captain)?.name??""}</div>
                  <svg width={160} height={160} viewBox="0 0 160 160">
                    {[0.25,0.5,0.75,1].map(f=><polygon key={f} points={gridPts(f)} fill="none" stroke="#ddd" strokeWidth={0.5}/>)}
                    {metrics.map((_,idx)=>{const[x,y]=pt(idx,r);return <line key={idx} x1={cx} y1={cy} x2={x} y2={y} stroke="#ddd" strokeWidth={0.5}/>;} )}
                    <polygon points={spiderPts} fill={teamColors[i]+"44"} stroke={teamColors[i]} strokeWidth={1.5}/>
                    {metrics.map((m,idx)=>{const[lx,ly]=pt(idx,r+14);return <text key={idx} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill="#555">{m.label}</text>;})}
                  </svg>
                </div>
              );
            })}
          </div>
          <p style={{fontSize:11,color:"#bbb",marginTop:12}}>Metrics normalised relative to all 8 teams. Youth = inverted age (higher = younger).</p>
        </div>
      )}

      {view==="lookup"&&(
        <div style={{maxWidth:480}}>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input type="text" placeholder="Enter player name..." value={lookupQuery}
              onChange={e=>{setLookupQuery(e.target.value);setLookupDone(false);}}
              onKeyDown={e=>e.key==="Enter"&&doLookup(lookupQuery)}
              style={{flex:1,padding:"8px 12px",borderRadius:6,border:"1px solid #ddd",fontSize:14}}/>
            <button onClick={()=>doLookup(lookupQuery)}
              style={{padding:"8px 16px",borderRadius:6,border:"none",background:"#3498db",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}>Find</button>
          </div>
          {lookupDone&&lookupResult&&(
            <div style={{background:"#f0f9ff",border:`2px solid ${teamColors[lookupResult.teamIdx]}`,borderRadius:8,padding:16}}>
              <div style={{fontSize:22,fontWeight:700,color:teamColors[lookupResult.teamIdx],marginBottom:4}}>{teamNames[lookupResult.teamIdx]}</div>
              <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>{lookupResult.player.name}</div>
              <div style={{display:"flex",gap:16,fontSize:13,color:"#555",flexWrap:"wrap"}}>
                <span>Position: <strong>{lookupResult.player.pos==="G"?"Goalie":lookupResult.player.pos==="F"?"Forward":"Defence"}</strong></span>
                <span>Score: <strong>{lookupResult.player.unrated?"Unrated":lookupResult.player.score}</strong></span>
                <span>Age: <strong>{lookupResult.player.age}</strong></span>
                <span>Weight: <strong>{lookupResult.player.weight} lbs</strong></span>
                {lookupResult.player.captain&&<span style={{color:teamColors[lookupResult.teamIdx],fontWeight:700}}>© Captain</span>}
              </div>
              <button onClick={()=>{setSelected(lookupResult.teamIdx);setView("roster");}}
                style={{marginTop:12,padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",background:teamColors[lookupResult.teamIdx],color:"#fff",fontWeight:600,fontSize:13}}>
                View Full Roster →
              </button>
            </div>
          )}
          {lookupDone&&!lookupResult&&(
            <div style={{background:"#fff8e1",border:"1px solid #f9a825",borderRadius:8,padding:16,fontSize:14}}>
              No player found matching "{lookupQuery}".
            </div>
          )}
        </div>
      )}

      {view==="roster"&&(
        <>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
            {teamNames.map((name,i)=>(
              <button key={i} onClick={()=>setSelected(i)}
                style={{padding:"6px 12px",borderRadius:6,border:"2px solid "+teamColors[i],cursor:"pointer",
                  background:selected===i?teamColors[i]:"#fff",color:selected===i?"#fff":teamColors[i],fontWeight:700,fontSize:13}}>
                {name}
              </button>
            ))}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:16,background:"#f8f9fa",borderRadius:8,padding:"12px 16px",borderLeft:"4px solid "+teamColors[selected]}}>
            {[["Players",stats.total],["Forwards",stats.fwd],["Defence",stats.def],
              ["Avg Score",stats.avgScore.toFixed(2)],["Avg Age",stats.avgAge.toFixed(1)],
              ["Avg Weight",stats.avgWeight.toFixed(0)+" lbs"]].map(([label,val])=>(
              <div key={label} style={{textAlign:"center",minWidth:80}}>
                <div style={{fontSize:20,fontWeight:700,color:teamColors[selected]}}>{val}</div>
                <div style={{fontSize:11,color:"#888"}}>{label}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#f0f9ff",border:"1px solid #bde0fe",borderRadius:8,padding:"10px 14px",marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:"#0369a1"}}>💡 Fun Facts</div>
            {getFunFacts(team).map((f,i)=><div key={i} style={{fontSize:12,color:"#334155",marginBottom:3}}>{f}</div>)}
          </div>
          {team.players.filter(p=>p.unrated).length>0&&(
            <div style={{background:"#fff8e1",border:"1px solid #f9a825",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13}}>
              <strong>⚠️ Unrated Players ({team.players.filter(p=>p.unrated).length})</strong> — scores need to be assigned:&nbsp;
              {team.players.filter(p=>p.unrated).map(p=>p.name).join(", ")}
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              {team.players.filter(p=>p.pos==="G").map((p,i)=>(
                <div key={i} style={{marginBottom:16}}>
                  <h4 style={{margin:"0 0 8px",color:"#2c3e50",borderBottom:"2px solid "+teamColors[selected],paddingBottom:4}}>🥅 Goalie</h4>
                  <GoalieRow p={p}/>
                </div>
              ))}
              <h4 style={{margin:"0 0 8px",color:"#2c3e50",borderBottom:"2px solid "+teamColors[selected],paddingBottom:4}}>⬆️ Forwards ({fwds.length})</h4>
              {fwds.map((p,i)=><PlayerRow key={p.name} p={p} i={i}/>)}
            </div>
            <div>
              <h4 style={{margin:"0 0 8px",color:"#2c3e50",borderBottom:"2px solid "+teamColors[selected],paddingBottom:4}}>🛡️ Defence ({defs.length})</h4>
              {defs.map((p,i)=><PlayerRow key={p.name} p={p} i={i}/>)}
            </div>
          </div>
          <p style={{fontSize:11,color:"#bbb",marginTop:12}}>Click ✏️ to edit a player's score or position. Changes automatically re-balance teams.</p>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
